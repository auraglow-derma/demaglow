<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AuraGlow – Premium Skincare Ghana</title>
<meta name="description" content="Ghana's premium skincare destination. Clean formulas, authentic products, fast nationwide delivery." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--nude:#F2EAE0;--blush:#F5D5C8;--rose:#E8A99A;
  --gold:#C9A96E;--gold-light:#E8D5A3;--gold-dark:#A07840;
  --text:#2C2016;--text-mid:#6B5744;--text-light:#A08070;
  --white:#FFFFFF;--border:#E8DDD0;
  --shadow:0 4px 32px rgba(44,32,22,.08);
  --shadow-lg:0 12px 48px rgba(44,32,22,.14);
  --r:14px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--nude)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
.serif{font-family:'Cormorant Garamond',serif}
.mesh-bg{background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(232,169,154,.22) 0%,transparent 55%),radial-gradient(ellipse 60% 80% at 80% 5%,rgba(201,169,110,.18) 0%,transparent 50%),radial-gradient(ellipse 70% 50% at 60% 90%,rgba(245,213,200,.28) 0%,transparent 55%),radial-gradient(ellipse 90% 40% at 10% 80%,rgba(232,213,163,.2) 0%,transparent 60%),var(--cream)}
.hidden{display:none!important}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.04em;transition:all .25s;text-decoration:none;font-size:.85rem}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;padding:12px 28px;box-shadow:0 4px 20px rgba(160,120,64,.3)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(160,120,64,.4)}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold-dark);padding:11px 26px}
.btn-outline:hover{background:var(--gold-light)}
.btn-sm{padding:8px 18px;font-size:.78rem}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;padding:10px 20px}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,211,102,.35)}
.btn-danger{background:#fee2e2;color:#dc2626;padding:8px 16px;font-size:.78rem;border-radius:50px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-danger:hover{background:#fecaca}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(18px);background:rgba(250,247,242,.88);border-bottom:1px solid var(--border);padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:600;color:var(--text);cursor:pointer}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-link{font-size:.82rem;font-weight:500;color:var(--text-mid);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;background:none;border:none;font-family:'DM Sans',sans-serif}
.nav-link:hover,.nav-link.active{color:var(--gold-dark)}
.nav-actions{display:flex;gap:10px;align-items:center}
.nav-icon-btn{background:none;border:none;cursor:pointer;color:var(--text-mid);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;position:relative;font-size:1.1rem}
.nav-icon-btn:hover{background:var(--blush);color:var(--gold-dark)}
.cart-badge{position:absolute;top:4px;right:4px;background:var(--gold);color:#fff;font-size:.6rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;padding:100px 48px 80px;position:relative;overflow:hidden}
.hero-content{max-width:560px;z-index:1}
.hero-eyebrow{font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';display:block;width:32px;height:1.5px;background:var(--gold)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,5.5rem);line-height:1.05;font-weight:400;margin-bottom:24px}
.hero-title em{font-style:italic;color:var(--gold-dark)}
.hero-subtitle{font-size:1rem;color:var(--text-mid);line-height:1.7;margin-bottom:40px;font-weight:300;max-width:420px}
.hero-actions{display:flex;gap:14px;flex-wrap:wrap}
.hero-visual{position:absolute;right:0;top:0;bottom:0;width:52%;overflow:hidden}
.hero-visual img{width:100%;height:100%;object-fit:cover}
.hero-visual::after{content:'';position:absolute;left:0;top:0;bottom:0;width:40%;background:linear-gradient(to right,var(--cream),transparent)}
.hero-stats{display:flex;gap:40px;margin-top:52px;padding-top:32px;border-top:1px solid var(--border)}
.hero-stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600}
.hero-stat-label{font-size:.72rem;color:var(--text-light);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* Marquee */
.marquee-wrap{overflow:hidden;background:var(--gold);padding:12px 0}
.marquee-track{display:flex;gap:48px;animation:marquee 22s linear infinite;white-space:nowrap;width:max-content}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-item{font-size:.72rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:14px}
.marquee-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.5)}

/* Section */
.section{padding:88px 48px}
.section-header{text-align:center;margin-bottom:56px}
.section-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:400;line-height:1.15}
.section-subtitle{font-size:.92rem;color:var(--text-mid);margin-top:12px;font-weight:300}

/* Product grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px}
.product-card{background:var(--white);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:all .3s;cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.product-img-wrap{position:relative;aspect-ratio:1;overflow:hidden;background:var(--nude)}
.product-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.product-card:hover .product-img-wrap img{transform:scale(1.07)}
.product-badge{position:absolute;top:12px;left:12px;background:var(--gold);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.wishlist-btn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-mid);font-size:1rem}
.wishlist-btn:hover,.wishlist-btn.active{background:var(--blush);color:var(--rose)}
.product-body{padding:16px}
.product-category{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.product-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:500;margin-bottom:6px;line-height:1.3}
.product-skin{font-size:.72rem;color:var(--text-light);margin-bottom:8px}
.product-rating{display:flex;align-items:center;gap:5px;margin-bottom:10px}
.stars{color:var(--gold);font-size:.75rem}
.rating-count{font-size:.7rem;color:var(--text-light)}
.product-price{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600}
.product-currency{font-size:.85rem;font-weight:400;color:var(--text-mid)}
.product-actions{display:flex;gap:8px;margin-top:12px}

/* Filters */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px}
.filter-chip{padding:8px 18px;border-radius:50px;font-size:.78rem;font-weight:500;border:1.5px solid var(--border);background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-chip:hover{border-color:var(--gold);color:var(--gold-dark)}
.filter-chip.active{background:var(--gold);border-color:var(--gold);color:#fff}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--border);border-radius:50px;padding:10px 18px;max-width:340px;flex:1;min-width:200px}
.search-bar input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);background:transparent;flex:1;min-width:0}

/* Cart */
.cart-overlay{position:fixed;inset:0;background:rgba(44,32,22,.35);z-index:200;display:flex;justify-content:flex-end;backdrop-filter:blur(4px)}
.cart-drawer{width:min(420px,100vw);height:100%;background:var(--white);display:flex;flex-direction:column;box-shadow:-12px 0 48px rgba(44,32,22,.12);animation:slideIn .25s ease-out}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500}
.cart-items{flex:1;overflow-y:auto;padding:20px}
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0}
.cart-item-name{font-size:.88rem;font-weight:500;margin-bottom:4px}
.cart-item-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--gold-dark)}
.qty-control{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.qty-btn:hover{background:var(--blush);border-color:var(--rose)}
.cart-footer{padding:20px;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:16px;align-items:center}
.cart-total-label{font-size:.85rem;color:var(--text-mid)}
.cart-total-val{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(44,32,22,.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:scaleIn .25s ease-out}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:28px 28px 0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:500}
.modal-body{padding:24px 28px 28px}
.form-group{margin-bottom:18px}
.form-label{font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mid);margin-bottom:7px;display:block}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);background:var(--cream);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}

/* Categories */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.cat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px 16px;text-align:center;cursor:pointer;transition:all .25s}
.cat-card:hover{background:linear-gradient(135deg,var(--blush),var(--nude));border-color:var(--rose);transform:translateY(-3px)}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500}
.cat-count{font-size:.72rem;color:var(--text-light);margin-top:4px}

/* Testimonials */
.testimonials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.testimonial-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px;position:relative}
.testimonial-card::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:5rem;color:var(--blush);position:absolute;top:10px;left:22px;line-height:1;pointer-events:none}
.testimonial-text{font-size:.9rem;color:var(--text-mid);line-height:1.7;margin-bottom:20px;position:relative;z-index:1;padding-top:20px}
.testimonial-author{display:flex;align-items:center;gap:12px}
.testimonial-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blush),var(--rose));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#fff;flex-shrink:0}
.testimonial-name{font-weight:600;font-size:.85rem}
.testimonial-loc{font-size:.72rem;color:var(--text-light)}

/* FAQ */
.faq-item{border-bottom:1px solid var(--border);padding:20px 0}
.faq-q{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:500;font-size:.9rem}
.faq-a{font-size:.88rem;color:var(--text-mid);line-height:1.7;padding-top:12px;display:none}
.faq-a.open{display:block}
.faq-icon{font-size:1.2rem;color:var(--gold);transition:transform .2s;flex-shrink:0}
.faq-icon.open{transform:rotate(45deg)}

/* Product detail */
.product-detail{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;padding-top:20px}
.product-detail-img{border-radius:var(--r);overflow:hidden;aspect-ratio:1}
.product-detail-img img{width:100%;height:100%;object-fit:cover}
.product-detail-price{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;margin:16px 0}
.product-detail-desc{font-size:.9rem;color:var(--text-mid);line-height:1.75;margin-bottom:20px}
.product-detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.tag{padding:5px 12px;background:var(--nude);border-radius:20px;font-size:.72rem;color:var(--text-mid);font-weight:500}
.qty-big{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.qty-big-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.qty-big-btn:hover{background:var(--blush)}
.qty-big-num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;min-width:28px;text-align:center}

/* Reviews */
.review-form{background:var(--nude);border-radius:var(--r);padding:24px;margin-top:24px}
.star-select{display:flex;gap:6px;margin-bottom:12px;cursor:pointer}
.review-list{margin-top:24px;display:flex;flex-direction:column;gap:16px}
.review-item{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px}
.review-item-header{display:flex;justify-content:space-between;margin-bottom:8px}
.review-item-name{font-weight:600;font-size:.85rem}
.review-item-text{font-size:.85rem;color:var(--text-mid);line-height:1.6}

/* Admin */
.admin-layout{display:flex;min-height:100vh}
.admin-sidebar{width:250px;background:var(--text);color:#fff;padding:32px 0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.admin-logo{padding:0 24px 28px;font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.admin-logo span{color:var(--gold)}
.admin-nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;cursor:pointer;font-size:.85rem;color:rgba(255,255,255,.7);transition:all .2s}
.admin-nav-item:hover,.admin-nav-item.active{background:rgba(201,169,110,.15);color:#fff;border-left:3px solid var(--gold)}
.admin-main{flex:1;padding:40px;background:var(--cream);overflow-y:auto}
.admin-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:12px}
.admin-page-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;margin-bottom:40px}
.stat-card{background:var(--white);border-radius:var(--r);padding:24px;border:1px solid var(--border)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:1.3rem}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600}
.stat-label{font-size:.78rem;color:var(--text-light);letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.admin-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.admin-table th{background:var(--nude);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);padding:14px 16px;text-align:left}
.admin-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:rgba(250,247,242,.7)}
.status-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.status-delivered{background:#d1fae5;color:#065f46}
.status-processing{background:#fef3c7;color:#92400e}
.status-shipped{background:#dbeafe;color:#1e40af}
.status-cancelled{background:#fee2e2;color:#991b1b}
.product-form{background:var(--white);border-radius:var(--r);padding:32px;border:1px solid var(--border);max-width:720px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}

/* Admin login */
.admin-login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--text);background-image:radial-gradient(ellipse at 20% 50%,rgba(201,169,110,.15) 0%,transparent 55%)}
.admin-login-box{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px;width:380px;max-width:90vw}
.admin-login-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;color:#fff;text-align:center;margin-bottom:8px}
.admin-login-logo span{color:var(--gold)}
.admin-login-sub{text-align:center;font-size:.8rem;color:rgba(255,255,255,.45);margin-bottom:32px;letter-spacing:.1em;text-transform:uppercase}
.admin-login-page .form-label{color:rgba(255,255,255,.6)}
.admin-login-page .form-input{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);color:#fff}
.admin-login-page .form-input::placeholder{color:rgba(255,255,255,.3)}

/* Newsletter */
.newsletter-section{background:linear-gradient(135deg,var(--text),#3D2A1A);padding:80px 48px;text-align:center}
.newsletter-title{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:#fff;margin-bottom:12px}
.newsletter-sub{font-size:.9rem;color:rgba(255,255,255,.65);margin-bottom:32px}
.newsletter-form{display:flex;max-width:440px;margin:0 auto}
.newsletter-input{flex:1;padding:14px 20px;border:none;border-radius:50px 0 0 50px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.newsletter-btn{padding:14px 24px;background:var(--gold);color:#fff;border:none;border-radius:0 50px 50px 0;cursor:pointer;font-weight:600;font-size:.85rem}
.newsletter-btn:hover{background:var(--gold-dark)}

/* Footer */
.footer{background:var(--text);color:#fff;padding:60px 48px 32px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px;max-width:1200px;margin-left:auto;margin-right:auto}
.footer-brand-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:12px}
.footer-brand-name span{color:var(--gold)}
.footer-desc{font-size:.82rem;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:20px}
.footer-heading{font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.footer-link{display:block;font-size:.82rem;color:rgba(255,255,255,.55);margin-bottom:10px;cursor:pointer;transition:color .2s;text-decoration:none;background:none;border:none;font-family:'DM Sans',sans-serif;text-align:left}
.footer-link:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:rgba(255,255,255,.4);flex-wrap:wrap;gap:8px;max-width:1200px;margin:0 auto}
.social-links{display:flex;gap:10px;margin-top:16px}
.social-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;cursor:pointer;color:rgba(255,255,255,.6);transition:all .2s;font-size:.9rem}
.social-btn:hover{background:var(--gold);color:#fff}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:14px 22px;border-radius:12px;font-size:.85rem;z-index:1000;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:toastIn .3s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Empty state */
.empty-state{text-align:center;padding:80px 20px}
.empty-icon{font-size:4rem;margin-bottom:16px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:8px}
.empty-sub{font-size:.88rem;color:var(--text-light);margin-bottom:24px}

/* Promise cards */
.promise-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}
.promise-card{padding:28px;background:var(--nude);border-radius:var(--r);border:1px solid var(--border)}
.promise-icon{font-size:2rem;margin-bottom:12px}
.promise-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:8px}
.promise-desc{font-size:.85rem;color:var(--text-mid);line-height:1.6}

/* Contact info */
.contact-info-item{display:flex;gap:12px;align-items:center;padding:16px;background:var(--white);border-radius:12px;border:1px solid var(--border);margin-bottom:12px}
.contact-info-label{font-size:.72rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em}
.contact-info-val{font-size:.88rem;font-weight:500}

/* Responsive */
@media(max-width:900px){
  .hero{padding:100px 24px 60px}.hero-visual{display:none}
  .section{padding:60px 24px}.footer-grid{grid-template-columns:1fr 1fr}
  .product-detail{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}
  .admin-layout{flex-direction:column}
  .admin-sidebar{width:100%;height:auto;position:static;display:flex;flex-wrap:wrap;padding:12px 16px;gap:4px}
  .admin-nav-item{padding:8px 14px;border-radius:8px;font-size:.78rem;border-left:none!important}
  .admin-main{padding:24px 16px}
  .nav-links{display:none}
}
@media(max-width:600px){
  .footer-grid{grid-template-columns:1fr}.hero-stats{gap:24px}
  .stat-cards{grid-template-columns:1fr 1fr}
  .newsletter-form{flex-direction:column}
  .newsletter-input{border-radius:10px 10px 0 0}
  .newsletter-btn{border-radius:0 0 10px 10px;padding:12px}
}
</style>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const WA = '233266601710';
const PRODUCTS = [
  {id:1,name:'Rose Glow Serum',price:189,description:'A luxurious vitamin C serum enriched with Bulgarian rose extract. Brightens, firms and evens skin tone for a radiant glow.',category:'Serums',skin_type:'All skin types',image:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400&q=80',stock:24,rating:4.8,reviews:142,badge:'Best Seller'},

  {id:3,name:'Petal Soft Cleanser',price:89,description:'A gentle micellar gel cleanser with peach blossom and ceramides. Removes makeup, pollution and excess sebum without stripping.',category:'Cleansers',skin_type:'Sensitive & Normal',image:'https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=400&q=80',stock:35,rating:4.7,reviews:211,badge:''},

  {id:5,name:'Velvet Matte Sunscreen SPF50',price:120,description:'Invisible SPF50 PA++++ with niacinamide. No white cast, no greasiness. Perfect under makeup.',category:'Sunscreen',skin_type:'All skin types',image:'https://images.unsplash.com/photo-1608248543803-ba4f8c70ae0b?w=400&q=80',stock:40,rating:4.6,reviews:189,badge:''},
  {id:6,name:'Sakura Eye Cream',price:165,description:'Caffeine-infused eye cream with Japanese cherry blossom. Depuffs, brightens dark circles and firms the delicate eye area.',category:'Eye Care',skin_type:'All skin types',image:'https://images.unsplash.com/photo-1596755389378-c31d21fd1273?w=400&q=80',stock:22,rating:4.8,reviews:54,badge:'Popular'},

const CATEGORIES = ['All','Serums','Moisturisers','Cleansers','Oils','Sunscreen','Eye Care','Toners','Masks','Exfoliants','Face Masks','Lip Care Products','Facial Oils','Body Care Products'];
const CAT_META = [{name:'Serums',count:12},{name:'Moisturisers',count:8},{name:'Cleansers',count:6},{name:'Oils',count:5},{name:'Sunscreen',count:4},{name:'Eye Care',count:7},{name:'Toners',count:5},{name:'Masks',count:9},{name:'Exfoliants',count:6},{name:'Face Masks',count:8},{name:'Lip Care Products',count:4},{name:'Facial Oils',count:7},{name:'Body Care Products',count:11}];
const TESTIMONIALS = [
  {text:'AuraGlow transformed my skincare routine! The Rose Glow Serum is literally magic — my skin has never looked better.',name:'Akosua Mensah',loc:'Accra, Ghana',stars:5},
  {text:"Fast delivery, authentic products, and incredible customer service. I've been shopping here for 6 months and never been disappointed.",name:'Ama Boateng',loc:'Kumasi, Ghana',stars:5},
  {text:'Finally found a skincare store that understands African skin tones. The Gold Elixir Face Oil is my holy grail product.',name:'Abena Asante',loc:'Takoradi, Ghana',stars:5},
  {text:'The WhatsApp ordering is so convenient! Got my entire skincare haul delivered in 2 days. Highly recommend AuraGlow.',name:'Efua Darko',loc:'Cape Coast, Ghana',stars:5},
];
const FAQS = [

  {q:'Can I return a product?',a:'Yes — we offer a 7-day return policy for unopened, undamaged products. Contact us via WhatsApp to initiate a return.'},

  {q:'Are the products suitable for all skin types?',a:'We carry products for every skin type. Each product listing clearly states skin type suitability so you can choose with confidence.'},
];
const DEMO_ORDERS = [
  {id:'ORD-001',customer_name:'Akosua Mensah',total:334,status:'delivered',created_at:'2025-05-28',items:2},
  {id:'ORD-002',customer_name:'Ama Boateng',total:189,status:'processing',created_at:'2025-06-01',items:1},
  {id:'ORD-003',customer_name:'Abena Asante',total:554,status:'shipped',created_at:'2025-06-02',items:3},
];

// ── State ─────────────────────────────────────────────────────────────────────
let cart = [], wishlist = [], reviews = {}, orders = [...DEMO_ORDERS];
let products = [...PRODUCTS], currentPage = 'home', selectedProduct = null;
let storeSearch = '', storeCat = 'All', storeSort = 'default';
let adminAuthed = false, adminPage = 'overview', editProductId = null;
let checkoutStep = 1, checkoutForm = {name:'',phone:'',address:'',email:''};
let reviewStars = 5, productQty = 1;

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt = p => `GH₵ ${Number(p).toFixed(2)}`;
const stars = n => '★'.repeat(Math.round(n)) + '☆'.repeat(5 - Math.round(n));
const initials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const waOrderUrl = (items, total, f={}) => {
  const lines = items.map(i=>`${i.qty}x ${i.name} @ ${fmt(i.price)}`).join('%0A');
  const hdr = f.name ? `Customer:%20${encodeURIComponent(f.name)}%0APhone:%20${f.phone}%0AAddress:%20${encodeURIComponent(f.address)}%0A%0AOrder:%0A` : `Hi!%20I'd%20like%20to%20order:%0A`;
  return `https://wa.me/${WA}?text=Hello%20AuraGlow!%0A%0A${hdr}${lines}%0A%0ATotal:%20${fmt(total)}`;
};
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.add('hidden'), 3000);
}
function scrollTop(){window.scrollTo(0,0);}

// ── Cart ──────────────────────────────────────────────────────────────────────
function addToCart(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const ex = cart.find(i=>i.id===id);
  if(ex) ex.qty++; else cart.push({...p, qty:1});
  updateBadges(); showToast(p.name + ' added to cart');
}
function removeFromCart(id){cart=cart.filter(i=>i.id!==id);updateBadges();renderCart();}
function updateQty(id,d){const i=cart.find(x=>x.id===id);if(i){i.qty=Math.max(1,i.qty+d);}updateBadges();renderCart();}
const cartTotal = () => cart.reduce((s,i)=>s+i.price*i.qty,0);
const cartCount = () => cart.reduce((s,i)=>s+i.qty,0);
function updateBadges(){
  const cc=cartCount(), wc=wishlist.length;
  const cb=document.getElementById('cart-badge'), wb=document.getElementById('wishlist-badge');
  cb.textContent=cc; cb.classList.toggle('hidden',cc===0);
  wb.textContent=wc; wb.classList.toggle('hidden',wc===0);
}
function toggleWishlist(id){
  if(wishlist.includes(id)) wishlist=wishlist.filter(x=>x!==id); else wishlist.push(id);
  updateBadges(); renderCurrentPage();
}
function openCart(){renderCart();document.getElementById('cart-overlay').classList.remove('hidden');}
function closeCart(){document.getElementById('cart-overlay').classList.add('hidden');}
function renderCart(){
  const cc=cartCount();
  document.getElementById('cart-count-label').textContent=cc;
  const list=document.getElementById('cart-items-list');
  const footer=document.getElementById('cart-footer');
  if(cart.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🛍</div><div class="empty-title">Your cart is empty</div><div class="empty-sub">Add some beautiful products!</div><button class="btn btn-gold" onclick="closeCart();showPage('store')">Shop Now</button></div>`;
    footer.innerHTML=''; return;
  }
  list.innerHTML = cart.map(item=>`
    <div class="cart-item">
      <img class="cart-item-img" src="${item.image}" alt="${item.name}" />
      <div style="flex:1;min-width:0">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmt(item.price)}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="updateQty(${item.id},-1)">−</button>
          <span style="font-size:.85rem;font-weight:600;min-width:20px;text-align:center">${item.qty}</span>
          <button class="qty-btn" onclick="updateQty(${item.id},1)">+</button>
          <button class="btn-danger" style="margin-left:auto;font-size:.72rem;padding:5px 12px" onclick="removeFromCart(${item.id})">Remove</button>
        </div>
      </div>
    </div>`).join('');
  footer.innerHTML=`

}

// ── Checkout ──────────────────────────────────────────────────────────────────
function openCheckout(){checkoutStep=1;renderCheckout();document.getElementById('checkout-overlay').classList.remove('hidden');}
function closeCheckout(){document.getElementById('checkout-overlay').classList.add('hidden');}
function renderCheckout(){
  const title=document.getElementById('checkout-modal-title');
  const body=document.getElementById('checkout-modal-body');
  title.textContent = checkoutStep===1 ? 'Checkout' : 'Complete Order';
  if(checkoutStep===1){
    body.innerHTML=`
      <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="co-name" value="${checkoutForm.name}" placeholder="Akosua Mensah" oninput="checkoutForm.name=this.value"/></div>

        <span class="serif" style="font-size:1.3rem;font-weight:700">${fmt(cartTotal())}</span>

      <p style="font-size:.72rem;color:var(--text-light);text-align:center;margin-top:12px">You'll be redirected to WhatsApp to finalise your order with our team.</p>`;
  }
}
function goToCheckoutStep2(){
  if(!checkoutForm.name||!checkoutForm.phone||!checkoutForm.address){showToast('Please fill in all required fields');return;}
  checkoutStep=2;renderCheckout();
}
function completeOrder(){
  orders.unshift({id:'ORD-'+Date.now(),customer_name:checkoutForm.name,total:cartTotal(),status:'processing',created_at:new Date().toISOString().slice(0,10),items:cart.length});
  cart=[]; checkoutForm={name:'',phone:'',address:'',email:''};
  updateBadges(); closeCheckout();
  showToast('Order placed! Check WhatsApp to complete payment 🎉');

// ── Pages ─────────────────────────────────────────────────────────────────────
function showPage(p){
  ['home','store','about','wishlist','product','admin-login','admin'].forEach(id=>{
    document.getElementById('page-'+id).classList.add('hidden');
  });
  const navbar=document.getElementById('navbar');
  const adminPages=['admin','admin-login'];
  navbar.style.display = adminPages.includes(p) ? 'none' : '';
  document.getElementById('page-'+p).classList.remove('hidden');
  currentPage=p;
  scrollTop();
  document.querySelectorAll('.nav-link').forEach(el=>{
    el.classList.toggle('active', el.textContent.toLowerCase()===p);
  });
  renderCurrentPage();
}
function renderCurrentPage(){
  if(currentPage==='home') renderHome();
  else if(currentPage==='store') renderStore();
  else if(currentPage==='about') renderAbout();
  else if(currentPage==='wishlist') renderWishlist();
  else if(currentPage==='product') renderProduct();
  else if(currentPage==='admin-login') renderAdminLogin();
  else if(currentPage==='admin') renderAdmin();
}

    <section class="section mesh-bg">

          <div>
            <div style="font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)">${p.category}</div>

            <p class="product-detail-desc">${p.description}</p>

              <span class="tag">For: ${p.skin_type}</span>
              <span class="tag">${p.stock>0?`✓ In Stock (${p.stock})`:'Out of Stock'}</span>
              ${p.badge?`<span class="tag" style="background:var(--gold-light)">${p.badge}</span>`:''}
            </div>
            <div class="qty-big">
              <button class="qty-big-btn" onclick="if(productQty>1){productQty--;renderProduct()}">−</button>
              <span class="qty-big-num serif" id="pqty">${productQty}</span>
              <button class="qty-big-btn" onclick="productQty++;renderProduct()">+</button>
              <span style="font-size:.8rem;color:var(--text-light)">Qty</span>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
              <button class="btn btn-gold" ${p.stock===0?'disabled':''} onclick="for(let i=0;i<productQty;i++)addToCart(${p.id})">Add ${productQty>1?productQty+'x ':''} to Cart</button>
              <button class="btn btn-outline" onclick="toggleWishlist(${p.id})">${inWish?'♥ Wishlisted':'♡ Wishlist'}</button>
              <a class="btn btn-wa" href="https://wa.me/${WA}?text=Hi!%20I'd%20like%20to%20order%20${productQty}x%20${encodeURIComponent(p.name)}%20-%20${fmt(p.price*productQty)}" target="_blank">📱 Order via WhatsApp</a>
            </div>
          </div>
        </div>

        <!-- Reviews -->
        <div style="margin-top:60px">
          <h2 class="serif" style="font-size:1.8rem;margin-bottom:24px">Customer Reviews</h2>
          <div class="review-form">
            <h3 class="serif" style="font-size:1.2rem;margin-bottom:16px">Write a Review</h3>
            <div class="star-select" id="star-select">
              ${[1,2,3,4,5].map(s=>`<span style="font-size:1.5rem;color:${s<=reviewStars?'var(--gold)':'var(--border)'}" onclick="reviewStars=${s};renderProduct()">&star;</span>`).join('')}
            </div>
            <input class="form-input" id="rev-name" placeholder="Your name" style="margin-bottom:10px"/>
            <textarea class="form-input" id="rev-text" placeholder="Share your experience…" rows="3" style="margin-bottom:14px;resize:vertical"></textarea>
            <button class="btn btn-gold btn-sm" onclick="submitReview(${p.id})">Submit Review</button>
          </div>
          <div class="review-list">
            ${rev.length===0?`<p style="color:var(--text-light);font-size:.88rem">No reviews yet — be the first!</p>`
            :rev.map(r=>`<div class="review-item"><div class="review-item-header"><span class="review-item-name">${r.name}</span><span style="color:var(--gold);font-size:.85rem">${'★'.repeat(r.stars)}</span></div><p class="review-item-text">${r.text}</p></div>`).join('')}
          </div>
        </div>
      </div>
    </section>
    ${footerHTML()}
  </div>`;
}
function submitReview(pid){
  const name=document.getElementById('rev-name').value.trim();
  const text=document.getElementById('rev-text').value.trim();
  if(!name||!text){showToast('Please fill in name and review');return;}
  if(!reviews[pid]) reviews[pid]=[];
  reviews[pid].unshift({name,text,stars:reviewStars,date:new Date().toLocaleDateString()});
  reviewStars=5; showToast('Review submitted! Thank you ✨');
  renderProduct();
}

function ordersTableHTML(list, withSelect){
  return `<table class="admin-table">
    <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th>${withSelect?'<th>Update</th>':''}</tr></thead>
    <tbody>${list.map(o=>`<tr>
      <td style="font-weight:600">${o.id}</td><td>${o.customer_name}</td><td>${o.items}</td>
      <td class="serif">${fmt(o.total)}</td>
      <td><span class="status-badge status-${o.status}">${o.status}</span></td>
      <td>${o.created_at}</td>
      ${withSelect?`<td><select class="form-input" style="padding:6px 10px;font-size:.78rem;border-radius:8px" onchange="updateOrderStatus('${o.id}',this.value)">
        ${['processing','shipped','delivered','cancelled'].map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}
      </select></td>`:''}
    </tr>`).join('')}</tbody>
  </table>`;
}
function updateOrderStatus(id, status){
  const o=orders.find(x=>x.id===id); if(o) o.status=status; renderAdmin();
}
function startEditProduct(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  editProductId=id;
  adminForm={name:p.name,price:String(p.price),description:p.description,category:p.category,skin_type:p.skin_type,stock:String(p.stock),image:p.image,badge:p.badge||''};
  adminPage='add-product'; renderAdmin();
}
function deleteProduct(id){products=products.filter(p=>p.id!==id);showToast('Product deleted');renderAdmin();}
function saveAdminProduct(){
  if(!adminForm.name||!adminForm.price){showToast('Name and price are required');return;}
  if(editProductId){
    const idx=products.findIndex(p=>p.id===editProductId);
    if(idx>-1) products[idx]={...products[idx],...adminForm,price:Number(adminForm.price),stock:Number(adminForm.stock||0)};
    showToast('Product updated!');
  } else {
    products.unshift({id:Date.now(),...adminForm,price:Number(adminForm.price),stock:Number(adminForm.stock||0),rating:4.5,reviews:0,image:adminForm.image||'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=400&q=80'});
    showToast('Product added!');
  }
  editProductId=null; adminForm={name:'',price:'',description:'',category:'Serums',skin_type:'All skin types',stock:'',image:'',badge:''};
  adminPage='products'; renderAdmin();
}
